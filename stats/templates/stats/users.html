{% extends 'base.html' %}
{% block content %}
{% load static %}
<div class="p-3">
  <div class="container">
    <div class="row mt-3">
      <div class="col mx-auto mb-3">
        <h2>Users</h2>
        <hr />
      </div>
    </div>
    <p><i>Select a column to sort by its values.</i></p>
    <div class="row m-1">
      <table class="table table-bordered table-striped text-center">
        <thead>
          <tr>
            <!--I'd recommend copying this stuff below and just replacing the fields for users-->
            <th scope="col" onclick="sortby('id')">ID</th>
            <th scope="col" onclick="sortby('username')">Username</th>
            <th scope="col" onclick="sortby('comments')">Comments</th>
          </tr>
        </thead>
        <tbody id="table-values">
          {% for user in template_data.users %}
          <tr id="table-row">
            <td id="td1">{{ user.user.id }}</td>
            <td id="td2">{{ user.user.username }}</td>
            <td id="td3">{{ user.count }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const tableBody = document.getElementById('table-values');
const tableValues = document.querySelectorAll('#table-row');

//Don't change anything through renderTable (except for the tableData dict entries)
let tableData = [];
tableValues.forEach(row => {
  tableData.push({
    id: row.querySelector('#td1').innerHTML,
    username: row.querySelector('#td2').innerHTML,
    comments: row.querySelector('#td3').innerHTML,
  })
});
console.log(tableData[3]);

function renderTable(data) {
  tableBody.innerHTML = '';
  data.forEach(row => {
    let newRow = document.createElement("tr");
    newRow.id = "table-row";
    let colCount = 1;
    Object.values(row).forEach(value => {
      let cell = document.createElement("td")
      cell.innerText = value;
      cell.id = 'td'+colCount;
      colCount++;
      newRow.appendChild(cell);
    });
    tableBody.appendChild(newRow);
  });
}

let sortDirection = {};

function sortby(method) {
  const sortedData = tableData.sort((a, b) => {
    if (method == 'username') {
      // For strings
      const valA = a[method];
      const valB = b[method];
      return valA.localeCompare(valB);
    } else {
      const valA = +a[method]; //Replace is to handle the $ in front of revenue, the plus sign in front convert the string to an int
      const valB = +b[method];
      if (method == 'id') {
        //Lowest number to highest number
        return valA - valB;
      }
      //Highest number to lowest number (used for purchases, revenue, and reviews)
      return valB - valA;
    }
  });
  renderTable(sortedData);
}


</script>
{% endblock content %}
