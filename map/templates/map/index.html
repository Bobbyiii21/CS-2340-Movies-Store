<script>
  const REGION_META = {
    northamerica: { label: "North America" },
    southamerica: { label: "South America" },
    europe: { label: "Europe" },
    asia: { label: "Asia" },
    australia: { label: "Australia" },
    africa: { label: "Africa" },
  };

  let allStats = null;
  let activeRegion = null;

  async function loadStats() {
    const res = await fetch("{% url 'map.regional_stats' %}");
    allStats = await res.json();
    updateMapLabels();
  }

  function updateMapLabels() {
    for (const key of Object.keys(REGION_META)) {
      const movies = allStats?.[key]?.movies ?? [];
      const top = movies[0];

      const label = document.getElementById("map-label-" + key);
      const movie_name = document.getElementById("movie-name-" + key);
      const img = document.getElementById("img-" + key);
      const overlay = document.getElementById("overlay-" + key);
      const title = document.getElementById("title-" + key);

      if (top) {
        if (top.image_url && img) {
          img.setAttribute("href", top.image_url);
          img.style.display = "block";
        }
        if (overlay) {
            overlay.style.display = "block";
        }
        if (title) { 
            title.style.display = "none";
        }
        if (movie_name) {
            movie_name.textContent = truncate(top.name, 20);
        }
        if (label) {
            label.textContent = top.purchase_count + " sold";
        }
      } else {
        if (label){
            label.textContent = "";
        }
      }
    }
  }

  function selectRegion(regionKey) {
    activeRegion = regionKey;
    const meta = REGION_META[regionKey];
    const movies = allStats?.[regionKey]?.movies ?? [];

    document
      .querySelectorAll(".region")
      .forEach((z) => z.classList.remove("active"));
    document.getElementById("zone-" + regionKey)?.classList.add("active");

    document.getElementById("panelTitle").textContent =
      `${meta.label} — Trending Movies`;

    const content = document.getElementById("panelContent");
    if (movies.length === 0) {
      content.innerHTML = `
      <p class="text-muted text-center py-3">
        No purchase data yet for this region.<br>
        <small>Be the first to buy a movie here!</small>
      </p>`;
    } else {
      const rows = movies
        .map((m, i) => {
          let badge;
          if (i === 0) {
            badge = `<span class="badge" style="background:#b3a369;color:#fff;min-width:32px;">#1</span>`;
          } else if (i === 1) {
            badge = `<span class="badge bg-secondary" style="min-width:32px;">#2</span>`;
          } else if (i === 2) {
            badge = `<span class="badge" style="background:#cd7f32;color:#fff;min-width:32px;">#3</span>`;
          } else {
            badge = `<span class="badge bg-light text-muted border" style="min-width:32px;">#${i + 1}</span>`;
          }
          return `
        <li class="list-group-item d-flex align-items-center gap-2 px-2 py-2">
          ${badge}
          <span class="flex-grow-1 fw-semibold" style="font-size:0.9rem;">${m.name}</span>
          <span class="badge rounded-pill"
                style="background-color:#003057;color:white;font-size:0.75rem;">
            ${m.purchase_count} sold
          </span>
        </li>`;
        })
        .join("");
      content.innerHTML = `<ul class="list-group list-group-flush">${rows}</ul>`;
    }
  }

  document.querySelectorAll(".region").forEach((zone) => {
    zone.addEventListener("click", () => selectRegion(zone.dataset.region));
  });

  function truncate(str, n) {
    return str.length > n ? str.slice(0, n) + "…" : str;
  }

  loadStats();
</script>
